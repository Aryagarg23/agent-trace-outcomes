name: "Agent Trace Outcomes"
description: >-
  Write an Outcome Record for a merged pull request: checks from the GitHub
  Checks API, verdict derived per the Outcome Record spec, reviewers from PR
  approvals, intent from the PR title. Records outcomes automatically from CI.
branding:
  icon: check-circle
  color: green

inputs:
  storage:
    description: 'Storage backend: "files" (.agent-trace/outcomes/, committed back) or "notes" (refs/notes/agent-trace/outcomes, pushed).'
    required: false
    default: files
  token:
    description: GitHub token used for the Checks/Reviews API and the push back.
    required: false
    default: ${{ github.token }}
  version:
    description: npm version of agent-trace-outcomes to run.
    required: false
    default: latest

runs:
  using: composite
  steps:
    - name: Record outcome
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        STORAGE: ${{ inputs.storage }}
        PKG_VERSION: ${{ inputs.version }}
        EVENT_NAME: ${{ github.event_name }}
        EVENT_PATH: ${{ github.event_path }}
        API_URL: ${{ github.api_url }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail

        if [ "$EVENT_NAME" = "pull_request" ]; then
          MERGED=$(jq -r '.pull_request.merged' "$EVENT_PATH")
          if [ "$MERGED" != "true" ]; then
            echo "PR not merged; nothing to record."
            exit 0
          fi
          # Checks ran on the PR head; the outcome attaches to the commit
          # that actually landed (the merge commit).
          CHECK_SHA=$(jq -r '.pull_request.head.sha' "$EVENT_PATH")
          REVISION=$(jq -r '.pull_request.merge_commit_sha' "$EVENT_PATH")
          TITLE=$(jq -r '.pull_request.title' "$EVENT_PATH")
          PR_URL=$(jq -r '.pull_request.html_url' "$EVENT_PATH")
          PR_NUMBER=$(jq -r '.pull_request.number' "$EVENT_PATH")

          APPROVER_ARGS=()
          while IFS= read -r login; do
            [ -n "$login" ] && APPROVER_ARGS+=(--reviewed-by "human:$login")
          done < <(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
                     -H "Accept: application/vnd.github+json" \
                     "$API_URL/repos/$REPO/pulls/$PR_NUMBER/reviews?per_page=100" \
                   | jq -r '[.[] | select(.state == "APPROVED") | .user.login] | unique | .[]')

          GITHUB_TOKEN="$GH_TOKEN" npx -y "agent-trace-outcomes@$PKG_VERSION" record \
            --from-checks "$CHECK_SHA" \
            --revision "$REVISION" \
            --intent "$TITLE" \
            --intent-source conversation --intent-url "$PR_URL" \
            --backend "$STORAGE" \
            "${APPROVER_ARGS[@]}"
        elif [ "$EVENT_NAME" = "workflow_run" ]; then
          REVISION=$(jq -r '.workflow_run.head_sha' "$EVENT_PATH")
          GITHUB_TOKEN="$GH_TOKEN" npx -y "agent-trace-outcomes@$PKG_VERSION" record \
            --from-checks "$REVISION" \
            --backend "$STORAGE"
        else
          echo "Unsupported event $EVENT_NAME (use pull_request closed or workflow_run completed)." >&2
          exit 1
        fi

    - name: Push the record
      shell: bash
      env:
        STORAGE: ${{ inputs.storage }}
      run: |
        set -euo pipefail
        git config user.name "agent-trace-outcomes[bot]"
        git config user.email "agent-trace-outcomes[bot]@users.noreply.github.com"
        if [ "$STORAGE" = "notes" ]; then
          git push origin refs/notes/agent-trace/outcomes
        else
          if git diff --quiet --exit-code -- .agent-trace/outcomes && \
             [ -z "$(git ls-files --others --exclude-standard .agent-trace/outcomes)" ]; then
            echo "No new outcome records to commit."
            exit 0
          fi
          git add .agent-trace/outcomes
          git commit -m "chore: record outcome for ${GITHUB_SHA:0:7} [skip ci]"
          git push
        fi
