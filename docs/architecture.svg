<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 700" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b6f78"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1160" height="700" fill="#151b28"/>
  <rect x="14" y="14" width="1132" height="672" rx="6" fill="#faf8f2" stroke="#151b28" stroke-width="2"/>

  <!-- Producers -->
  <g>
    <rect x="50" y="50" width="230" height="64" rx="8" fill="#ececea" stroke="#9a9a95"/>
    <text x="165" y="76" text-anchor="middle" font-size="15" font-weight="600" fill="#1c2230">CI Job</text>
    <text x="165" y="94" text-anchor="middle" font-size="11" fill="#5a5f6b">GitHub Action</text>

    <rect x="385" y="50" width="230" height="64" rx="8" fill="#ececea" stroke="#9a9a95"/>
    <text x="500" y="76" text-anchor="middle" font-size="15" font-weight="600" fill="#1c2230">Agent Loop</text>
    <text x="500" y="94" text-anchor="middle" font-size="11" fill="#5a5f6b">recordOutcome()</text>

    <rect x="720" y="50" width="230" height="64" rx="8" fill="#ececea" stroke="#9a9a95"/>
    <text x="835" y="76" text-anchor="middle" font-size="15" font-weight="600" fill="#1c2230">Developer</text>
    <text x="835" y="94" text-anchor="middle" font-size="11" fill="#5a5f6b">CLI: record</text>
  </g>

  <!-- Producers converge -->
  <path d="M165,114 L165,140 L835,140 L835,114" fill="none" stroke="#6b6f78" stroke-width="1.6"/>
  <line x1="500" y1="114" x2="500" y2="140" stroke="#6b6f78" stroke-width="1.6"/>
  <line x1="500" y1="140" x2="500" y2="176" stroke="#6b6f78" stroke-width="1.6" marker-end="url(#arrow)"/>

  <text x="500" y="200" text-anchor="middle" font-size="22" font-weight="700" fill="#1c2230">Outcome Records</text>
  <text x="500" y="216" text-anchor="middle" font-size="12" font-style="italic" fill="#6b6f78">written at the verification gate</text>

  <!-- Record cluster -->
  <rect x="50" y="230" width="900" height="196" rx="10" fill="none" stroke="#9a9a95" stroke-dasharray="6,5"/>

  <g font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#8a8a86">
    <g>
      <rect x="70" y="249" width="260" height="158" rx="6" fill="#f5f4ee" stroke="#cfcec8"/>
      <text x="84" y="271">{</text>
      <text x="84" y="287">  "version": "0.1.0",</text>
      <text x="84" y="303">  "id": "e8f9a0b1-...",</text>
      <text x="84" y="319">  "vcs": {</text>
      <text x="84" y="335">    "revision": "c9d8e7f…"</text>
      <text x="84" y="351">  },</text>
      <text x="84" y="367">  "checks": [ … ],</text>
      <text x="84" y="383">  "verdict": "verified"</text>
    </g>
    <g>
      <rect x="370" y="249" width="260" height="158" rx="6" fill="#f5f4ee" stroke="#cfcec8"/>
      <text x="384" y="271">{</text>
      <text x="384" y="287">  "version": "0.1.0",</text>
      <text x="384" y="303">  "id": "a3c1f2d0-...",</text>
      <text x="384" y="319">  "vcs": {</text>
      <text x="384" y="335">    "revision": "5f4a3b2…"</text>
      <text x="384" y="351">  },</text>
      <text x="384" y="367">  "checks": [ … ],</text>
      <text x="384" y="383">  "verdict": "failed"</text>
    </g>
    <g>
      <rect x="670" y="249" width="260" height="158" rx="6" fill="#f5f4ee" stroke="#cfcec8"/>
      <text x="684" y="271">{</text>
      <text x="684" y="287">  "version": "0.1.0",</text>
      <text x="684" y="303">  "id": "0c1d2e3f-...",</text>
      <text x="684" y="319">  "vcs": {</text>
      <text x="684" y="335">    "revision": "d0e1f2a…"</text>
      <text x="684" y="351">  },</text>
      <text x="684" y="367">  "checks": [ … ],</text>
      <text x="684" y="383">  "verdict": "verified"</text>
    </g>
  </g>

  <!-- optional Agent Trace link -->
  <rect x="980" y="255" width="160" height="72" rx="8" fill="none" stroke="#9a9a95" stroke-dasharray="4,4"/>
  <text x="1060" y="280" text-anchor="middle" font-size="13" font-weight="600" fill="#3a3f49">Agent Trace</text>
  <text x="1060" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#3a3f49">records</text>
  <text x="1060" y="312" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6b6f78">(optional)</text>
  <line x1="980" y1="291" x2="950" y2="291" stroke="#6b6f78" stroke-width="1.4" stroke-dasharray="4,4"/>
  <text x="965" y="279" text-anchor="middle" font-size="10.5" fill="#6b6f78">trace_ids</text>
  <text x="1060" y="345" text-anchor="middle" font-size="10.5" fill="#6b6f78">outcomes work</text>
  <text x="1060" y="359" text-anchor="middle" font-size="10.5" fill="#6b6f78">without it too</text>

  <!-- to storage -->
  <line x1="500" y1="426" x2="500" y2="462" stroke="#6b6f78" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="330" y="462" width="340" height="70" rx="8" fill="#ececea" stroke="#9a9a95"/>
  <text x="500" y="491" text-anchor="middle" font-size="16" font-weight="700" fill="#1c2230">Storage</text>
  <text x="500" y="509" text-anchor="middle" font-size="11" fill="#5a5f6b">.agent-trace/outcomes/ or refs/notes/agent-trace/outcomes</text>

  <!-- storage diverges -->
  <line x1="500" y1="532" x2="500" y2="558" stroke="#6b6f78" stroke-width="1.6"/>
  <path d="M165,594 L165,558 L835,558 L835,594" fill="none" stroke="#6b6f78" stroke-width="1.6"/>
  <line x1="500" y1="558" x2="500" y2="594" stroke="#6b6f78" stroke-width="1.6"/>
  <line x1="165" y1="558" x2="165" y2="594" stroke="#6b6f78" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="500" y1="558" x2="500" y2="594" stroke="#6b6f78" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="835" y1="558" x2="835" y2="594" stroke="#6b6f78" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Consumers -->
  <g>
    <rect x="50" y="594" width="230" height="64" rx="8" fill="#ececea" stroke="#9a9a95"/>
    <text x="165" y="620" text-anchor="middle" font-size="15" font-weight="600" fill="#1c2230">Merge Gate</text>
    <text x="165" y="638" text-anchor="middle" font-size="11" fill="#5a5f6b">verdictFor()</text>

    <rect x="385" y="594" width="230" height="64" rx="8" fill="#ececea" stroke="#9a9a95"/>
    <text x="500" y="620" text-anchor="middle" font-size="15" font-weight="600" fill="#1c2230">Context Assembly</text>
    <text x="500" y="638" text-anchor="middle" font-size="11" fill="#5a5f6b">queryLessons()</text>

    <rect x="720" y="594" width="230" height="64" rx="8" fill="#ececea" stroke="#9a9a95"/>
    <text x="835" y="620" text-anchor="middle" font-size="15" font-weight="600" fill="#1c2230">Log / Audit</text>
    <text x="835" y="638" text-anchor="middle" font-size="11" fill="#5a5f6b">queryLog()</text>
  </g>
</svg>
